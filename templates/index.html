<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear-Lock Mailer</title>
    <style>
        /* JURUS PAMUNGKAS: CSS LANGSUNG DI DALAM HTML */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #bb9371 0%, #fceddb 60%, #f3b1be 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #533e31;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background-color: #fffaf5;
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(83, 62, 49, 0.15);
            border: 3px solid #fceddb;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            background-color: #533e31;
            color: #ffffff;
            padding: 12px;
            border-radius: 20px;
            font-size: 22px;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #6e5443;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .card-title {
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            color: #533e31;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        hr {
            border: 0;
            height: 1px;
            background-color: #f3b1be;
            margin: 15px 0 25px 0;
        }

        .input-group {
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: bold;
            color: #6e5443;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #fceddb;
            border-radius: 15px;
            box-sizing: border-box;
            font-size: 14px;
            color: #533e31;
            background-color: #ffffff;
            margin-top: 8px;
            display: block;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #f3b1be;
            box-shadow: 0 0 8px rgba(243, 177, 190, 0.5);
        }

        button[type="submit"] {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #bb9371 0%, #f3b1be 100%);
            border: none;
            border-radius: 20px;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(187, 147, 113, 0.3);
            transition: transform 0.2s ease, opacity 0.2s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .footer-bar {
            text-align: center;
            background-color: #533e31;
            color: #fceddb;
            font-size: 11px;
            padding: 10px;
            border-radius: 25px;
            margin-top: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-title">
            <h2>BEAR-LOCK MAILER</h2>
            <div class="subtitle">✨ ubah nama panjangmu jadi kode rahasia & kirim ke WA ✨</div>
        </div>

        <div class="crypto-card">
            <div class="card-title">
                🔒 ENKRIPSI DOSEN PREMIUM
            </div>
            <hr>

            <form action="/" method="POST">
                <div class="input-group">
                    <label>🐻 NAMA DEPAN (PENGIRIM)</label>
                    <input type="text" name="nama" placeholder="contoh: jule" required>
                </div>

                <div class="input-group">
                    <label>🍯 NAMA BELAKANG (PESAN RAHASIA)</label>
                    <input type="text" name="pesan" placeholder="contoh: aja" required>
                </div>

                <div class="input-group">
                    <label>🔑 KUNCI RAHASIA (KEY)</label>
                    <input type="text" name="kunci" placeholder="contoh: BEARHONEY" required>
                </div>

                <button type="submit">
                    🔒 ENKRIPSI SEKARANG
                </button>
            </form>
        </div>

        <div class="footer-bar">
            ✨ 💖 made with love • bear & honey • double layer cryptography 💖 ✨
        </div>
    </div>

</body>
</html>
