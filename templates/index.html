<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BearLock - Buat Pesan Rahasia</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #fcf8f2; color: #4a3f35; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; background-color: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #ffb7b2; border: none; color: #4a3f35; font-weight: bold; }
        .btn-primary:hover { background-color: #ffa49e; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2>🐻 BearLock Secure Mail</h2>
                <p class="text-muted">Kirim pesan terenkripsi via WhatsApp</p>
            </div>
            <div class="card p-4">
                <div class="card-body">
                    
                    {% if whatsapp_url %}
                        <div class="alert alert-success text-center">
                            🎉 <b>Pesan Rahasia Berhasil Dibuat!</b>
                        </div>
                        <div class="form-group mt-4">
                            <label>Link Pesan Rahasia:</label>
                            <input type="text" class="form-control" value="{{ share_url }}" readonly>
                        </div>
                        <a href="{{ whatsapp_url }}" target="_blank" class="btn btn-success btn-block font-weight-bold mt-3" style="background-color: #25D366; border: none;">
                            🟢 Kirim via WhatsApp
                        </a>
                        <a href="/" class="btn btn-outline-secondary btn-block btn-sm mt-3">Buat Pesan Baru</a>
                    {% else %}
                        <form method="POST">
                            <div class="form-group">
                                <label>Nama Pengirim:</label>
                                <input type="text" name="sender_name" class="form-control" placeholder="Contoh: Budi" required>
                            </div>
                            <div class="form-group">
                                <label>Nomor WhatsApp Tujuan:</label>
                                <input type="text" name="whatsapp_number" class="form-control" placeholder="Contoh: 62812345678" required>
                                <small class="form-text text-muted">Gunakan kode negara (misal: 628xxx)</small>
                            </div>
                            <div class="form-group">
                                <label>Isi Pesan Rahasia:</label>
                                <textarea name="message" class="form-control" rows="4" placeholder="Tulis pesan rahasiamu di sini..." required></textarea>
                            </div>
                            <div class="form-group">
                                <label>Buat Kode OTP (Maks 6 Karakter):</label>
                                <input type="text" name="otp" class="form-control" placeholder="Contoh: 123456" maxlength="6" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block mt-4">Kunci & Amankan Pesan</button>
                        </form>
                    {% endif %}
                    
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
