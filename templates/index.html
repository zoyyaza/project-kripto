<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BearLock - Gate</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { background-color: #fcf8f2; color: #4a3f35; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; background-color: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #ffb7b2; border: none; color: #4a3f35; font-weight: bold; }
        .btn-primary:hover { background-color: #ffa49e; }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="text-center mb-4">
                <h2>🐻 BearLock Secure Mail</h2>
            </div>
            <div class="card p-4">
                <div class="card-body">
                    
                    {% if success %}
                        <div class="alert alert-success text-center">
                            <h4>🔓 OTP Benar</h4>
                        </div>
                        <div class="mt-3">
                            <label>Pesan Rahasia dari <b>{{ sender }}</b>:</label>
                            <textarea class="form-control" rows="5" readonly>{{ plaintext }}</textarea>
                        </div>
                    {% else %}
                        <form method="POST">
                            <p class="text-center">Masukkan kode OTP untuk mendekripsi pesan.</p>
                            
                            {% with messages = get_flashed_messages(with_categories=true) %}
                                {% if messages %}
                                    {% for category, message in messages %}
                                        <div class="alert alert-danger">{{ message }}</div>
                                    {% endfor %}
                                {% endif %}
                            {% endwith %}

                            <div class="form-group">
                                <input type="text" name="otp" class="form-control text-center" placeholder="Masukkan OTP" required maxlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">Buka Pesan</button>
                        </form>
                    {% endif %}
                    
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
